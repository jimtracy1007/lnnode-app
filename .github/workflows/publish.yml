name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # macOS Intel (darwin-x64) is NOT supported — @nodeflow-network/nodeflow-bin has no
  # darwin-x64 build (rgb-lightning-node has no Intel Mac upstream binary). arm64 only.

  build-mac-arm:
    runs-on: macos-latest
    environment: prod-deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove package-lock.json
        run: rm -f package-lock.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: "yarn"

      - name: Cache Electron (macOS)
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('yarn.lock') }}

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Prebuild Prisma (mac-arm)
        run: yarn prebuild

      - name: Build (mac-arm)
        env:
          ELECTRON_BUILDER_PUBLISH: never
        run: npx electron-builder --mac=dmg --arm64 --publish=never

      - name: Upload artifacts (mac-arm)
        uses: actions/upload-artifact@v4
        with:
          name: dist-mac-arm
          path: |
            dist/*.dmg
            dist/*.blockmap

