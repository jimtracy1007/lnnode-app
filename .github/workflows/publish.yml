  build-windows:
    runs-on: windows-latest
    environment: prod-deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove package-lock.json (Windows)
        run: |
          if (Test-Path "package-lock.json") {
            Remove-Item "package-lock.json" -Force
            Write-Host "Removed package-lock.json"
          }

      - name: Setup MSBuild (Windows)
        uses: microsoft/setup-msbuild@v2

      - name: Setup Node.js (Windows)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: "yarn"

      - name: Cache Electron (Windows)
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\cache
          key: ${{ runner.os }}-electron-${{ hashFiles('yarn.lock') }}

      - name: Cache node-gyp (Windows)
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\node-gyp\Cache
            ~\.node-gyp
          key: ${{ runner.os }}-node-gyp-${{ hashFiles('yarn.lock') }}

      - name: Configure build environment (Windows)
        run: |
          # Configure npm for better network handling
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retries 3
          npm config set registry https://registry.npmjs.org/

          # Configure node-gyp for Windows SDK
          npm config set msvs_version 2022
          npm config set python python3

          # Set environment variables for native compilation
          echo "PYTHON=python3" >> $env:GITHUB_ENV
          echo "npm_config_cache=$env:USERPROFILE\.npm" >> $env:GITHUB_ENV
          echo "npm_config_node_gyp=$env:USERPROFILE\AppData\Roaming\npm\node_modules\node-gyp\bin\node-gyp.js" >> $env:GITHUB_ENV

      - name: Setup Python and Build Tools (Windows)
        run: |
          # Install Visual Studio Build Tools 2022 with C++ workload
          choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.Windows11SDK.22000 --includeRecommended --passive" -y
        continue-on-error: true

      - name: Install deps with comprehensive retry and fallback
        run: |
          # Set additional environment variables for native compilation
          $env:PYTHON = "python"
          $env:npm_config_python = "python"
          $env:npm_config_msvs_version = "2022"
          $env:npm_config_node_gyp = (Get-Command node).Source.Replace("node.exe", "node_modules\node-gyp\bin\node-gyp.js")

          for ($i = 1; $i -le 3; $i++) {
            Write-Host "Attempt $i of 3"
            try {
              if ($i -eq 1) {
                # First attempt: Try normal install
                Write-Host "Trying normal install..."
                yarn install --frozen-lockfile --network-timeout 300000
              } elseif ($i -eq 2) {
                # Second attempt: Skip optional dependencies
                Write-Host "Trying without optional dependencies..."
                yarn install --frozen-lockfile --network-timeout 300000 --ignore-optional
              } else {
                # Final attempt: Skip everything possible
                Write-Host "Trying with all ignores..."
                yarn install --frozen-lockfile --network-timeout 300000 --ignore-optional --ignore-engines --ignore-platform
              }
              Write-Host "Install successful!"
              break
            } catch {
              Write-Host "Attempt $i failed: $($_.Exception.Message)"
              if ($i -lt 3) {
                Write-Host "Retrying in 30 seconds..."
                Start-Sleep -Seconds 30
              } else {
                Write-Host "All attempts failed, but continuing with build..."
              }
            }
          }

      - name: Build (Windows x64)
        env:
          ELECTRON_BUILDER_PUBLISH: never
        run: npm run build:win

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows-x64
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.blockmap

  release:
    runs-on: ubuntu-latest
    needs:
      - build-mac-amd
      - build-mac-arm
      - build-windows
    environment: prod-deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove package-lock.json
        run: rm -f package-lock.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: "yarn"

      - name: Download artifacts (mac-amd)
        uses: actions/download-artifact@v4
        with:
          name: dist-mac-amd
          path: dist/mac-amd/

      - name: Download artifacts (mac-arm)
        uses: actions/download-artifact@v4
        with:
          name: dist-mac-arm
          path: dist/mac-arm/

      - name: Download artifacts (Windows)
        uses: actions/download-artifact@v4
        with:
          name: dist-windows-x64
          path: dist/windows-x64/

      - name: List downloaded files
        run: |
          echo "Files in dist directory:"
          ls -la dist/
          echo "DMG files found:"
          find dist -name "*.dmg" -type f || echo "No DMG files found"
          echo "EXE files found:"
          find dist -name "*.exe" -type f || echo "No EXE files found"

      - name: Generate build hash
        id: build-hash
        run: |
          # Hash all the final package files
          BUILD_HASH=$(find dist -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" \) -exec sha256sum {} \; | sha256sum | cut -d' ' -f1)
          echo "build_hash=$BUILD_HASH" >> $GITHUB_OUTPUT
          echo "Build hash: $BUILD_HASH"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p dist
          echo "{\"version\":\"$PACKAGE_VERSION\",\"buildHash\":\"$BUILD_HASH\",\"buildTime\":\"$BUILD_TIME\"}" > dist/build-info.json

      - name: Upload combined build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ steps.build-hash.outputs.build_hash }}
          path: |
            dist/**/*.dmg
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.blockmap
            dist/build-info.json

      - name: Read package version
        id: pkg-version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg-version.outputs.version }}
          name: Release v${{ steps.pkg-version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            dist/**/*.dmg
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.blockmap
            dist/build-info.json
