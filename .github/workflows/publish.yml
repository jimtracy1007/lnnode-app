  release:
    runs-on: ubuntu-latest
    needs:
      # - build-mac-amd
      - build-mac-arm
      # - build-windows
    environment: prod-deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Remove package-lock.json
        run: rm -f package-lock.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: "yarn"

      # - name: Download artifacts (mac-amd)
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: dist-mac-amd
      #     path: dist/mac-amd/

      - name: Download artifacts (mac-arm)
        uses: actions/download-artifact@v4
        with:
          name: dist-mac-arm
          path: dist/mac-arm/

      # - name: Download artifacts (Windows)
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: dist-windows-x64
      #     path: dist/windows-x64/

      - name: Consolidate artifacts to dist root
        run: |
          # Move all artifacts to dist root to avoid duplicate matching
          mkdir -p dist
          if [ -d "dist/mac-amd" ]; then
            mv dist/mac-amd/* dist/ 2>/dev/null || true
          fi
          if [ -d "dist/mac-arm" ]; then
            mv dist/mac-arm/* dist/ 2>/dev/null || true
          fi
          # if [ -d "dist/windows-x64" ]; then
          #   mv dist/windows-x64/* dist/ 2>/dev/null || true
          # fi
          echo "Final dist contents:"
          ls -la dist/

      - name: List downloaded files
        run: |
          echo "Files in dist directory:"
          ls -la dist/
          echo ""
          echo "DMG files found:"
          find dist -name "*.dmg" -type f || echo "No DMG files found"
          echo ""
          # echo "Windows installer files found:"
          # find dist -name "*.exe" -type f || echo "No EXE files found"
          # find dist -name "*.msi" -type f || echo "No MSI files found"
          echo ""
          echo "BLOCKMAP files found:"
          find dist -name "*.blockmap" -type f || echo "No BLOCKMAP files found"


      - name: Generate build hash
        id: build-hash
        run: |
          # Hash all the final package files (include all platforms)
          BUILD_HASH=$(find dist -type f \( -name "*.dmg" -o -name "*.blockmap" \) -exec sha256sum {} \; | sha256sum | cut -d' ' -f1)
          echo "build_hash=$BUILD_HASH" >> $GITHUB_OUTPUT
          echo "Build hash: $BUILD_HASH"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p dist
          echo "{\"version\":\"$PACKAGE_VERSION\",\"buildHash\":\"$BUILD_HASH\",\"buildTime\":\"$BUILD_TIME\"}" > dist/build-info.json

      - name: Upload combined build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ steps.build-hash.outputs.build_hash }}
          path: |
            dist/**/*.dmg
            dist/**/*.blockmap
            dist/build-info.json

      - name: Read package version and commit info
        id: pkg-version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          echo "commit_short=$COMMIT_SHORT" >> $GITHUB_OUTPUT
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          RECENT_COMMITS=$(git log --oneline -10)
          echo "Recent commits:"
          echo "$RECENT_COMMITS"

      - name: Delete stale tag if exists
        run: |
          TAG="v${{ steps.pkg-version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "Deleting stale tag $TAG..."
            git push origin :refs/tags/$TAG || true
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release body
        id: release-body
        run: |
          BODY=$(git log --oneline -10 --pretty=format:'- %h %s')
          # Use delimiter for multiline output
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "## Changes" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Build:** ${{ steps.pkg-version.outputs.commit_short }} | **Branch:** ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg-version.outputs.version }}
          target_commitish: ${{ steps.pkg-version.outputs.commit_sha }}
          name: Release v${{ steps.pkg-version.outputs.version }}
          body: ${{ steps.release-body.outputs.body }}
          draft: false
          prerelease: false
          files: |
            dist/*.dmg
            # dist/*.exe
            # dist/*.msi
            dist/*.blockmap
            dist/build-info.json
          fail_on_unmatched_files: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
