<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'none';">
  <title>NodeFlow</title>
  <link rel="stylesheet" href="welcome.css">
</head>
<body>
  <main class="welcome-root">

    <header class="welcome-header">
      <div class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 48 48" width="48" height="48">
          <defs>
            <linearGradient id="boltGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#d0f224"/>
              <stop offset="100%" stop-color="#9ac018"/>
            </linearGradient>
          </defs>
          <rect x="1.5" y="1.5" width="45" height="45" rx="12" ry="12"
                fill="#151515" stroke="#d0f224" stroke-width="1.25" stroke-opacity="0.6"/>
          <path d="M27 9 L13 27 L22 27 L19 39 L34 20 L25 20 Z"
                fill="url(#boltGrad)"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1 class="brand-name">NodeFlow</h1>
        <p class="brand-tagline">Lightning Network &middot; RGB &middot; Nostr</p>
      </div>
    </header>

    <section id="status-banner" class="banner banner-hidden" role="alert"></section>

    <section id="port-check-section" class="port-check-hidden" role="status"></section>

    <section class="card">
      <div class="card-header">
        <h2 class="card-title">Bundled Components</h2>
      </div>
      <dl class="version-list">
        <dt>NodeFlow</dt>          <dd id="v-app">—</dd>
        <dt>rgb-lightning-node</dt><dd id="v-rgb">—</dd>
        <dt>litd</dt>              <dd id="v-litd">—</dd>
      </dl>
    </section>

    <button id="start-btn" class="cta-btn" type="button">
      <span class="cta-label">Start</span>
      <svg viewBox="0 0 24 24" width="20" height="20" class="cta-icon" aria-hidden="true">
        <path d="M8 5l10 7-10 7V5z" fill="currentColor"/>
      </svg>
    </button>

    <section class="recovery">
      <h3 class="section-title">Recovery &amp; Maintenance</h3>
      <div class="action-grid">

        <button id="backup-btn" class="ghost-btn" type="button">
          <span class="ghost-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
          </span>
          <span class="ghost-label">Backup Data Now</span>
        </button>

        <button id="clear-btn" class="ghost-btn ghost-danger" type="button">
          <span class="ghost-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
            </svg>
          </span>
          <span class="ghost-label">Clear All Data</span>
        </button>

        <button id="open-data-btn" class="ghost-btn" type="button">
          <span class="ghost-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
            </svg>
          </span>
          <span class="ghost-label">Open Data Folder</span>
        </button>

        <button id="quit-btn" class="ghost-btn" type="button">
          <span class="ghost-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
            </svg>
          </span>
          <span class="ghost-label">Quit</span>
        </button>

      </div>
    </section>

    <footer class="welcome-footer">
      <p class="footer-line">
        <span class="footer-label">Data directory:</span>
        <code id="data-dir">—</code>
      </p>
      <p class="footer-line">
        <span class="footer-label">Logs:</span>
        <code id="log-dir">—</code>
      </p>
      <p class="footer-line">
        <span class="footer-label">lnlink Logs:</span>
        <code id="lnlink-log-dir">—</code>
      </p>
    </footer>

  </main>

  <div id="toast" class="toast toast-hidden" role="status"></div>

  <div id="overlay" class="overlay overlay-hidden" aria-hidden="true">
    <div class="overlay-spinner"></div>
    <p class="overlay-text" id="overlay-text">Working…</p>
  </div>

  <script src="welcome.js"></script>
</body>
</html>
